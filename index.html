/* ═══════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════ */
const PHASES      = ['어드레스','탑','임팩트','팔로우스루'];
const PHASE_KEYS  = ['address','top','impact','follow'];
const PHASE_EMOJI = ['🏌️','⬆️','💥','🔄'];
const PHASE_COLOR = ['#22c55e','#06b6d4','#f59e0b','#a855f7'];
const DOMAIN = {
  spine:  {color:'#22c55e', label:'척추/자세',   icon:'🦴'},
  grip:   {color:'#06b6d4', label:'그립/손목',   icon:'✋'},
  lower:  {color:'#f59e0b', label:'하체/이동',   icon:'🦵'},
  finish: {color:'#a855f7', label:'팔로우스루',  icon:'🏌️'},
};

// MediaPipe 33 landmark 연결선 (골프 핵심 부위)
const POSE_CONNECTIONS = [
  [11,12],[11,23],[12,24],[23,24],          // 몸통
  [11,13],[13,15],[12,14],[14,16],          // 팔
  [15,17],[15,19],[15,21],[17,19],          // 왼손
  [16,18],[16,20],[16,22],[18,20],          // 오른손
  [23,25],[25,27],[27,29],[27,31],[29,31],  // 왼다리
  [24,26],[26,28],[28,30],[28,32],[30,32],  // 오른다리
  [0,1],[1,2],[2,3],[3,7],                  // 얼굴
  [0,4],[4,5],[5,6],[6,8],[9,10],
];

// 골프 스윙 정상 범위
const METRIC_RANGES = {
  spineAngle:      {min:0,  max:60,  idealMin:32, idealMax:48, unit:'°',  label:'척추 전경각',   hint:'어드레스: 35~45° 권장'},
  leftKnee:        {min:130,max:180, idealMin:155,idealMax:175,unit:'°',  label:'왼쪽 무릎각',  hint:'굴곡 유지: 155~175°'},
  rightKnee:       {min:130,max:180, idealMin:155,idealMax:175,unit:'°',  label:'오른쪽 무릎각',hint:'굴곡 유지: 155~175°'},
  xFactor:         {min:0,  max:80,  idealMin:35, idealMax:55, unit:'°',  label:'X-Factor(힙-숄더)',hint:'탑: 35~55° 이상적'},
  leftElbow:       {min:90, max:180, idealMin:155,idealMax:180,unit:'°',  label:'왼팔꿈치각',   hint:'임팩트: 155~180° 직선'},
  shoulderTilt:    {min:0,  max:30,  idealMin:0,  idealMax:10, unit:'°',  label:'어깨 기울기',  hint:'좌우 기울기 최소화'},
};

/* ═══════════════════════════════════════════════
   MEDIAPIPE 초기화 & 관절 분석
═══════════════════════════════════════════════ */
let poseInstance = null;
let poseCallback = null;
let mpReady = false;
let mpFailed = false;

async function initMediaPipe() {
  if (typeof Pose === 'undefined') { mpFailed = true; return false; }
  try {
    poseInstance = new Pose({
      locateFile: f => 'https://cdn.jsdelivr.net/npm/@mediapipe/pose/' + f
    });
    poseInstance.setOptions({
      modelComplexity: 1,
      smoothLandmarks: false,
      enableSegmentation: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5,
    });
    poseInstance.onResults(results => {
      if (poseCallback) { poseCallback(results); poseCallback = null; }
    });
    // WASM 모델 완전 로드 대기
    await poseInstance.initialize();
    mpReady = true;
    return true;
  } catch(e) {
    console.warn('MediaPipe init failed:', e);
    mpFailed = true;
    return false;
  }
}

function getPoseLandmarks(dataUrl) {
  return new Promise((resolve) => {
    if (!poseInstance || mpFailed || !mpReady) { resolve(null); return; }
    const timeout = setTimeout(() => { poseCallback = null; resolve(null); }, 15000);
    poseCallback = results => {
      clearTimeout(timeout);
      resolve(results.poseLandmarks || null);
    };
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => poseInstance.send({image: img}).catch(e2 => {
      clearTimeout(timeout); poseCallback = null; resolve(null);
    });
    img.onerror = () => { clearTimeout(timeout); poseCallback = null; resolve(null); };
    img.src = dataUrl;
  });
}

/* ── 각도 계산 유틸 ── */
function calcAngle(a, b, c) {
  const v1 = { x: a.x-b.x, y: a.y-b.y };
  const v2 = { x: c.x-b.x, y: c.y-b.y };
  const dot = v1.x*v2.x + v1.y*v2.y;
  const mag = Math.hypot(v1.x,v1.y) * Math.hypot(v2.x,v2.y);
  if (mag === 0) return 0;
  return Math.acos(Math.max(-1, Math.min(1, dot/mag))) * 180/Math.PI;
}

function extractMetrics(lm) {
  if (!lm || lm.length < 33) return null;
  const midX = (a,b) => (lm[a].x+lm[b].x)/2;
  const midY = (a,b) => (lm[a].y+lm[b].y)/2;

  // 척추 전경각 (수평에서 얼마나 앞으로 기울었는지)
  const shoulderMidX = midX(11,12), shoulderMidY = midY(11,12);
  const hipMidX      = midX(23,24), hipMidY      = midY(23,24);
  const spineAngle   = Math.abs(Math.atan2(shoulderMidX-hipMidX, -(shoulderMidY-hipMidY)) * 180/Math.PI);

  // 무릎 굴곡각 (180°=완전 신전)
  const leftKnee  = calcAngle(lm[23], lm[25], lm[27]);
  const rightKnee = calcAngle(lm[24], lm[26], lm[28]);

  // X-Factor: 어깨라인과 힙라인 회전 차이
  const shoulderAngle = Math.atan2(lm[12].y-lm[11].y, lm[12].x-lm[11].x) * 180/Math.PI;
  const hipAngle      = Math.atan2(lm[24].y-lm[23].y, lm[24].x-lm[23].x) * 180/Math.PI;
  const xFactor       = Math.abs(shoulderAngle - hipAngle);

  // 왼팔꿈치 각도
  const leftElbow = calcAngle(lm[11], lm[13], lm[15]);

  // 어깨 기울기 (좌우)
  const shoulderTilt = Math.abs(Math.atan2(lm[12].y-lm[11].y, lm[12].x-lm[11].x) * 180/Math.PI);

  return {
    spineAngle:   Math.round(spineAngle*10)/10,
    leftKnee:     Math.round(leftKnee*10)/10,
    rightKnee:    Math.round(rightKnee*10)/10,
    xFactor:      Math.round(Math.min(xFactor,75)*10)/10,
    leftElbow:    Math.round(leftElbow*10)/10,
    shoulderTilt: Math.round(Math.min(shoulderTilt,30)*10)/10,
  };
}

/* ── 스켈레톤 오버레이 그리기 → dataUrl 반환 ── */
function drawSkeletonOverlay(originalDataUrl, landmarks, metrics, phaseColor) {
  return new Promise((resolve) => {
    if (!landmarks) { resolve(originalDataUrl); return; }
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width  = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      const px = lm => ({ x: lm.x * canvas.width, y: lm.y * canvas.height });
      const color  = phaseColor || '#22c55e';
      const dimCol = 'rgba(255,255,255,.25)';

      // 연결선
      ctx.lineWidth = Math.max(2, canvas.width/300);
      POSE_CONNECTIONS.forEach(([i,j]) => {
        const a = landmarks[i], b = landmarks[j];
        if (!a || !b) return;
        const vis = Math.min(a.visibility||1, b.visibility||1);
        if (vis < 0.25) return;
        const pa = px(a), pb = px(b);
        ctx.globalAlpha = Math.min(1, vis * 1.2);
        ctx.strokeStyle = color;
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.stroke();
      });

      // 관절 점
      ctx.globalAlpha = 1;
      landmarks.forEach((lm) => {
        if ((lm.visibility||1) < 0.25) return;
        const p = px(lm);
        const r = Math.max(3, canvas.width/160);
        ctx.beginPath();
        ctx.fillStyle = '#fff';
        ctx.arc(p.x, p.y, r+1, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.fillStyle = color;
        ctx.arc(p.x, p.y, r, 0, Math.PI*2);
        ctx.fill();
      });

      // 수치 라벨
      if (metrics) {
        const fs   = Math.max(11, canvas.width/45);
        const pad  = fs*0.4;
        const drawLabel = (x, y, text, col) => {
          ctx.font      = `bold ${fs}px 'JetBrains Mono',monospace`;
          const w       = ctx.measureText(text).width;
          ctx.fillStyle = 'rgba(0,0,0,.72)';
          ctx.fillRect(x-pad, y-fs, w+pad*2, fs+pad*1.5);
          ctx.fillStyle = col || '#f59e0b';
          ctx.fillText(text, x, y);
        };

        const hipMidX = (landmarks[23].x+landmarks[24].x)/2 * canvas.width;
        const hipMidY = (landmarks[23].y+landmarks[24].y)/2 * canvas.height;
        drawLabel(hipMidX+8, hipMidY-8, `척추 ${metrics.spineAngle}°`, '#f59e0b');

        const lKneeX = landmarks[25].x * canvas.width;
        const lKneeY = landmarks[25].y * canvas.height;
        drawLabel(lKneeX+8, lKneeY, `무릎L ${metrics.leftKnee}°`, '#06b6d4');

        const rKneeX = landmarks[26].x * canvas.width;
        const rKneeY = landmarks[26].y * canvas.height;
        drawLabel(rKneeX+8, rKneeY, `무릎R ${metrics.rightKnee}°`, '#06b6d4');

        if ((landmarks[13].visibility||1) > 0.3) {
          const elbX = landmarks[13].x * canvas.width;
          const elbY = landmarks[13].y * canvas.height;
          drawLabel(elbX+8, elbY, `팔꿈치 ${metrics.leftElbow}°`, '#a855f7');
        }
      }

      resolve(canvas.toDataURL('image/jpeg', 0.88));
    };
    img.onerror = () => resolve(originalDataUrl);
    img.src = originalDataUrl;
  });
}

/* ═══════════════════════════════════════════════
   프레임 추출
═══════════════════════════════════════════════ */
function extractFrames(videoEl, count=40) {
  return new Promise((resolve, reject) => {
    const dur = videoEl.duration;
    if (!dur || isNaN(dur)) { reject(new Error('동영상 길이를 읽을 수 없습니다')); return; }
    const margin = dur * 0.03;
    const usable = dur - margin * 2;

    // 균등 24개 + 스윙 핵심구간(35~72%) 집중 16개 → 중복 제거 후 정렬
    const uniform = Array.from({length:24}, (_,i) => margin + usable * i / 23);
    const swingS  = margin + usable * 0.35;
    const swingE  = margin + usable * 0.72;
    const focused = Array.from({length:16}, (_,i) => swingS + (swingE - swingS) * i / 15);
    const merged  = [...new Set([...uniform, ...focused].map(t => Math.round(t*1000)))]
                      .sort((a,b) => a-b)
                      .map(t => t/1000);

    const canvas = document.createElement('canvas');
    const ctx    = canvas.getContext('2d');
    const frames = [];
    let idx = 0;
    const next = () => {
      if (idx >= merged.length) { resolve(frames); return; }
      videoEl.currentTime = merged[idx];
    };
    videoEl.onseeked = () => {
      try {
        const s = Math.min(480/videoEl.videoWidth, 360/videoEl.videoHeight, 1);
        canvas.width  = Math.round(videoEl.videoWidth * s);
        canvas.height = Math.round(videoEl.videoHeight * s);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
        frames.push({dataUrl, base64:dataUrl.split(',')[1], time:merged[idx], idx});
      } catch(e) {/* skip */}
      idx++; next();
    };
    videoEl.onerror = reject;
    next();
  });
}

/* ═══════════════════════════════════════════════
   JSON 추출 (중첩 구조 안전 파싱)
═══════════════════════════════════════════════ */
function extractJSON(text) {
  const clean = text.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
  const start = clean.indexOf('{');
  if (start===-1) throw new Error('JSON 시작 괄호({) 없음');
  let depth=0;
  for (let i=start;i<clean.length;i++) {
    if (clean[i]==='{') depth++;
    else if (clean[i]==='}') { depth--; if(depth===0) return JSON.parse(clean.slice(start,i+1)); }
  }
  throw new Error('JSON 파싱 실패');
}

/* ═══════════════════════════════════════════════
   CLAUDE API
═══════════════════════════════════════════════ */
async function callClaude(apiKey, messages, maxTokens=1600) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify({model:'claude-opus-4-5', max_tokens:maxTokens, messages})
  });
  if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||`API Error ${res.status}`); }
  return (await res.json()).content[0].text;
}

async function classifyKeyFrames(apiKey, frames) {
  const step    = Math.max(1, Math.floor(frames.length/12));
  const samples = frames.filter((_,i)=>i%step===0).slice(0,16);
  const idxMap  = samples.map(f=>f.idx);
  const content = [
    {type:'text', text:
`골프 스윙 프레임 ${samples.length}개(번호 0~${samples.length-1}).
각 단계에 가장 부합하는 프레임 번호를 JSON으로 출력:
- address: 어드레스 — 클럽이 지면 근처, 양발 벌림, 상체 전경
- top: 백스윙 탑 — 클럽헤드 최고점, 왼팔 수평 이상
- impact: 임팩트 — 클럽이 볼 위치(지면)에 가장 가까운 순간, 체중이 왼쪽으로 이동 시작, 팔이 몸 앞 최대한 낮은 위치
- follow: 팔로우스루/피니시 — 클럽이 머리 위로 올라간 완성 자세
★ impact는 가장 중요합니다. 클럽헤드가 지면에 가장 가까운 프레임을 선택하세요.
형식(숫자만): {"address":0,"top":4,"impact":7,"follow":10}`},
    ...samples.flatMap((f,i)=>[
      {type:'text',text:`[프레임 ${i}]`},
      {type:'image',source:{type:'base64',media_type:'image/jpeg',data:f.base64}}
    ])
  ];
  const raw = await callClaude(apiKey, [{role:'user',content}], 100);
  const p = extractJSON(raw);
  const clamp = v => Math.min(samples.length-1,Math.max(0,parseInt(v)||0));
  return {
    address: idxMap[clamp(p.address)],
    top:     idxMap[clamp(p.top)],
    impact:  idxMap[clamp(p.impact)],
    follow:  idxMap[clamp(p.follow)],
  };
}

/* MetricBar — 관절 수치 시각화 */
function MetricBar({metricKey, value}) {
  if (value == null) return null;
  const cfg = METRIC_RANGES[metricKey];
  if (!cfg) return null;
  const pct       = Math.max(0, Math.min(100, (value-cfg.min)/(cfg.max-cfg.min)*100));
  const idealLPct = Math.max(0, (cfg.idealMin-cfg.min)/(cfg.max-cfg.min)*100);
  const idealWPct = Math.max(0, (cfg.idealMax-cfg.idealMin)/(cfg.max-cfg.min)*100);
  const isGood    = value >= cfg.idealMin && value <= cfg.idealMax;
  const barColor  = isGood ? 'var(--green)' : value < cfg.idealMin ? 'var(--cyan)' : 'var(--amber)';
  return (
    <div style={{marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
        <span style={{fontSize:12,color:'var(--muted)'}}>{cfg.label}</span>

          <span style={{fontFamily:'JetBrains Mono',fontSize:13,fontWeight:600,color:barColor}}>{value}{cfg.unit}</span>
          <span style={{fontSize:10,color:isGood?'var(--green)':'var(--amber)'}}>{isGood?'✓ 정상':'⚠ 범위 외'}</span>
        </div>
      </div>
      <div className="metric-bar-track">
        <div className="metric-bar-ideal" style={{left:`${idealLPct}%`,width:`${idealWPct}%`}}/>
        <div className="metric-bar-fill" style={{width:`${pct}%`,background:barColor}}/>
        <div className="metric-bar-marker" style={{left:`${pct}%`,background:barColor}}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--dim)',marginTop:2}}>
        <span>{cfg.min}{cfg.unit}</span>
        <span style={{color:'rgba(34,197,94,.6)'}}>이상적: {cfg.idealMin}~{cfg.idealMax}{cfg.unit}</span>
        <span>{cfg.max}{cfg.unit}</span>

  );
}

/* ─── TrendChart ─── */
function TrendChart({history}) {
  const ref = useRef();
  useEffect(() => {
    if (!ref.current || !window.Chart || !history.length) return;
    const ex = Chart.getChart(ref.current); if (ex) ex.destroy();
    const sorted = [...history].reverse();
    const labels = sorted.map(h => { const d=new Date(h.date); return (d.getMonth()+1)+'/'+(d.getDate()); });
    const mkDs = (key, color) => ({
      label:DOMAIN[key].label,
      data:sorted.map(h => (h.scores&&h.scores[key])||0),
      borderColor:color,backgroundColor:'transparent',
      pointBackgroundColor:color,pointRadius:2,borderWidth:1.5,tension:.3,borderDash:[3,3]
    });
    new Chart(ref.current, {type:'line',
      data:{labels,datasets:[
        {label:'종합',data:sorted.map(h=>h.totalScore),borderColor:'#22c55e',
         backgroundColor:'rgba(34,197,94,.07)',pointBackgroundColor:'#22c55e',
         pointRadius:4,borderWidth:2.5,fill:true,tension:.3},
        mkDs('spine','#22c55e'),mkDs('grip','#06b6d4'),mkDs('lower','#f59e0b'),mkDs('finish','#a855f7')
      ]},
      options:{
        scales:{
          x:{grid:{color:'rgba(30,48,72,.6)'},ticks:{color:'#4a6a8a',font:{size:9}}},
          y:{min:0,max:100,grid:{color:'rgba(30,48,72,.6)'},ticks:{color:'#4a6a8a',font:{size:9}}}
        },
        plugins:{legend:{display:false}},animation:{duration:700}
      }
    });
  }, [history]);
  return <canvas ref={ref} style={{width:'100%',height:180}}/>;
}

/* ─── CmpRadar ─── */
function CmpRadar({sA, sB}) {
  const ref = useRef();
  useEffect(() => {
    if (!ref.current || !window.Chart) return;
    const ex = Chart.getChart(ref.current); if (ex) ex.destroy();
    const labels = ['척추/자세','그립/손목','하체/이동','팔로우스루'];
    new Chart(ref.current, {type:'radar',
      data:{labels,datasets:[
        {label:'A',data:[sA.scores.spine,sA.scores.grip,sA.scores.lower,sA.scores.finish],
         borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.1)',pointBackgroundColor:'#22c55e',pointRadius:4,borderWidth:2},
        {label:'B',data:[sB.scores.spine,sB.scores.grip,sB.scores.lower,sB.scores.finish],
         borderColor:'#06b6d4',backgroundColor:'rgba(6,182,212,.1)',pointBackgroundColor:'#06b6d4',pointRadius:4,borderWidth:2}
      ]},
      options:{
        scales:{r:{min:0,max:100,
          grid:{color:'rgba(30,48,72,.8)'},angleLines:{color:'rgba(30,48,72,.8)'},
          pointLabels:{color:'#6b8aaa',font:{size:10}},ticks:{display:false}}},
        plugins:{legend:{labels:{color:'#6b8aaa',font:{size:10},boxWidth:10},display:true,position:'bottom'}},
        animation:{duration:800}
      }
    });
  }, [sA, sB]);
  return <canvas ref={ref} width={240} height={240}/>;
}

/* ═══════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════ */
function App() {
  const [step,        setStep]        = useState(0);
  const [apiKey,      setApiKey]      = useState(()=>localStorage.getItem('swingai_k')||'');
  const [showKey,     setShowKey]     = useState(false);
  const [videoFile,   setVideoFile]   = useState(null);
  const [videoUrl,    setVideoUrl]    = useState('');
  const [clubType,    setClubType]    = useState('driver');
  const [cameraAngle, setCameraAngle] = useState('side');
  const [frames,      setFrames]      = useState([]);
  const [keyFrameIdx, setKeyFrameIdx] = useState({address:0,top:6,impact:13,follow:18});
  const [progPct,     setProgPct]     = useState(0);
  const [progMsg,     setProgMsg]     = useState('');
  const [loadMsg,     setLoadMsg]     = useState('');
  // Phase 2 new states
  const [poseData,    setPoseData]    = useState({});       // {address: metrics, ...}
  const [skeletonUrls,setSkeletonUrls]= useState({});      // {address: dataUrl, ...}
  const [mpStatus,    setMpStatus]    = useState('idle');   // idle|loading|ready|failed
  const [poseProgress,setPoseProgress]= useState(0);
  const [selPhase,    setSelPhase]    = useState('address');
  const [classified,  setClassified]  = useState(false);
  const [result,      setResult]      = useState(null);
  const [error,       setError]       = useState('');
  const [dragOver,    setDragOver]    = useState(false);

  const [tab,     setTab]     = useState('analysis');
  const [history, setHistory] = useState(() => hLoad());
  const [cmpSel,  setCmpSel]  = useState({a:null, b:null});

  const videoRef = useRef(null);
  const fileRef  = useRef(null);

  const saveKey = k => { setApiKey(k); localStorage.setItem('swingai_k',k); };

  const handleFile = file => {
    if (!file?.type.startsWith('video/')) { setError('동영상 파일만 가능합니다'); return; }
    if (file.size>250*1024*1024) { setError('250MB 이하만 가능합니다'); return; }
    setError(''); setVideoFile(file); setVideoUrl(URL.createObjectURL(file));
  };

  /* STEP 0 → 1: 프레임 추출 */
  const doExtract = async () => {
    const vid = videoRef.current;
    if (!vid) { setError('영상 로드 오류'); return; }
    setError(''); setStep(1); setProgPct(0);
    try {
      let p=0;
      const t = setInterval(()=>{ p=Math.min(p+4,88); setProgPct(p); },150);
      const extracted = await extractFrames(vid, 40);
      clearInterval(t); setProgPct(100);
      if (!extracted.length) throw new Error('추출된 프레임이 없습니다');
      setFrames(extracted);
      const n=extracted.length;
      setKeyFrameIdx({address:0,top:Math.floor(n*.3),impact:Math.floor(n*.6),follow:Math.floor(n*.85)});
      setClassified(false);
      setTimeout(()=>setStep(2), 400);
    } catch(e) { setError('프레임 추출 실패: '+e.message); setStep(0); }
  };

  /* STEP 2: AI 분류 */
  const doClassify = async () => {
    if (!apiKey) { setError('API 키를 입력해주세요'); return; }
    setError(''); setLoadMsg('Claude Vision이 스윙 구간 분류 중…');
    try {
      const kf = await classifyKeyFrames(apiKey, frames);
      setKeyFrameIdx(kf); setClassified(true); setLoadMsg('');
    } catch(e) { setError('AI 분류 실패: '+e.message); setLoadMsg(''); }
  };

  /* STEP 2 → 3: MediaPipe 관절 분석 */
  const doPoseAnalysis = async () => {
    setStep(3); setError('');
    setPoseProgress(0);

    // MediaPipe 초기화
    setProgMsg('MediaPipe Pose 모델 로드 중…');
    setMpStatus('loading');
    const ok = await initMediaPipe();
    if (!ok) { setMpStatus('failed'); }
    else { setMpStatus('ready'); }

    const newPoseData     = {};
    const newSkeletonUrls = {};

    for (let i=0; i<PHASE_KEYS.length; i++) {
      const k = PHASE_KEYS[i];
      const f = frames[keyFrameIdx[k]];
      if (!f) continue;
      setProgMsg(`${PHASES[i]} 관절 분석 중… (${i+1}/4)`);
      setPoseProgress(Math.round((i/4)*100));

      let lm = null;
      if (ok && poseInstance) {
        lm = await getPoseLandmarks(f.dataUrl);
      }
      const metrics = extractMetrics(lm);
      newPoseData[k] = metrics;

      // 스켈레톤 오버레이
      const overlayUrl = await drawSkeletonOverlay(f.dataUrl, lm, metrics, PHASE_COLOR[i]);
      newSkeletonUrls[k] = overlayUrl;

      setPoseProgress(Math.round(((i+1)/4)*100));
    }

    setPoseData(newPoseData);
    setSkeletonUrls(newSkeletonUrls);
    setProgMsg('');

            </div>
            <div style={{display:'grid',gridTemplateColumns:isMob()?'repeat(2,1fr)':'repeat(4,1fr)',gap:12,marginTop:24,maxWidth:680,marginLeft:'auto',marginRight:'auto'}}>
              {PHASE_KEYS.map((k,pi)=>{
                const url=skeletonUrls[k]||frames[keyFrameIdx[k]]?.dataUrl;
                return url?(
                  <div key={k} className="scan-wrap" style={{borderRadius:10,overflow:'hidden',border:`1px solid ${PHASE_COLOR[pi]}44`}}>
                    <img src={url} style={{width:'100%',display:'block',filter:'brightness(.85)'}} alt={PHASES[pi]}/>
                    <div className="scan-line"/>
                    <div style={{padding:'5px',fontSize:10,textAlign:'center',color:PHASE_COLOR[pi],fontWeight:600,background:'var(--s2)'}}>
                      {PHASE_EMOJI[pi]} {PHASES[pi]}
                    </div>
                  </div>
                ):null;
              })}
            </div>
          </div>
        )}

        {/* ==================== STEP 5: REPORT ==================== */}
        {step===5 && result && (
          <div className="fade-up">
            {/* Report header */}
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6,flexWrap:'wrap'}}>
                  <span style={{fontFamily:'Bebas Neue',fontSize:36,letterSpacing:2,color:'#fff'}}>분석 리포트</span>
                  <span style={{fontSize:10,background:'var(--bd)',color:'var(--muted)',padding:'2px 10px',borderRadius:20,fontFamily:'JetBrains Mono'}}>
                    {new Date().toLocaleDateString('ko-KR')} · {clubType}
                  </span>
                  {mpStatus==='ready' && <span className="tag-mp">관절 수치 포함</span>}
                </div>
                <p style={{fontSize:13,color:'var(--muted)',maxWidth:560,lineHeight:1.8}}>{result.summary}</p>
              </div>
              <div className="no-print" style={{display:'flex',gap:8}}>
                <button onClick={reset} style={{padding:'7px 14px',borderRadius:8,background:'var(--bd)',border:'none',color:'var(--muted)',fontSize:12,cursor:'pointer'}}>↺ 새 분석</button>
                <button onClick={()=>window.print()} style={{padding:'7px 14px',borderRadius:8,background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.3)',color:'var(--green)',fontSize:12,cursor:'pointer'}}>🖨 인쇄</button>
              </div>
            </div>

            {/* ── Scores + Radar ── */}
            <div className="card" style={{marginBottom:16}}>
              <div style={{display:'flex',alignItems:'center',gap:24,flexWrap:'wrap'}}>
                {/* Total */}
                <div style={{textAlign:'center',flexShrink:0}}>
                  <div style={{fontSize:10,color:'var(--muted)',marginBottom:8,letterSpacing:1,textTransform:'uppercase'}}>종합 점수</div>
                  <div style={{width:92,height:92,borderRadius:'50%',
                    background:`conic-gradient(var(--green) ${totalScore*3.6}deg,var(--bd) 0deg)`,
                    display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 18px rgba(34,197,94,.25)'}}>
                    <div style={{width:72,height:72,borderRadius:'50%',background:'var(--s1)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                      <span style={{fontSize:24,fontWeight:900,color:'var(--green)',lineHeight:1,fontFamily:'JetBrains Mono'}}>{totalScore}</span>
                      <span style={{fontSize:10,color:'var(--dim)'}}>/100</span>
                    </div>
                  </div>
                  <div style={{marginTop:6,fontSize:11,color:totalScore>=80?'var(--green)':totalScore>=60?'var(--amber)':'var(--red)',fontWeight:600}}>
                    {totalScore>=80?'🏆 우수':totalScore>=60?'⚡ 개선중':'🔧 집중교정'}
                  </div>
                </div>
                {/* Domain rings */}
                <div style={{display:'flex',gap:16,flexWrap:'wrap',flex:1,justifyContent:'center'}}>
                  {Object.keys(DOMAIN).map(d=><ScoreRing key={d} score={result.scores?.[d]||0} domain={d}/>)}
                </div>
                {/* Radar chart */}
                <div style={{flexShrink:0}}>
                  <RadarChart scores={result.scores}/>
                </div>
              </div>
            </div>

            {/* ── 스켈레톤 오버레이 프레임 ── */}
            <div className="card" style={{marginBottom:16}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:700,color:'#fff'}}>🦴 관절 분석 프레임</div>
                {mpStatus==='ready'
                  ? <span className="tag-mp">MediaPipe 스켈레톤 오버레이</span>
                  : <span style={{fontSize:10,padding:'2px 7px',borderRadius:4,background:'rgba(245,158,11,.15)',color:'var(--amber)',fontFamily:'JetBrains Mono',border:'1px solid rgba(245,158,11,.3)'}}>AI Vision 분석</span>}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
                {PHASE_KEYS.map((k,pi)=>{
                  const url=skeletonUrls[k]||frames[keyFrameIdx[k]]?.dataUrl;
                  const m=poseData[k];
                  return (
                    <div key={k} style={{borderRadius:10,overflow:'hidden',border:`1px solid ${PHASE_COLOR[pi]}55`,background:'var(--s2)'}}>
                      {url ? <img src={url} alt={PHASES[pi]} style={{width:'100%',display:'block',aspectRatio:'4/3',objectFit:'cover'}}/> : <div style={{height:90,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'var(--dim)'}}>없음</div>}
                      <div style={{padding:'5px 8px'}}>
                        <div style={{fontSize:11,textAlign:'center',color:PHASE_COLOR[pi],fontWeight:600,marginBottom:4}}>
                          {PHASE_EMOJI[pi]} {PHASES[pi]}
                        </div>
                        {m && (
                          <div style={{fontSize:9,color:'var(--dim)',fontFamily:'JetBrains Mono',lineHeight:1.7,textAlign:'center'}}>
                            척추 {m.spineAngle}° · 무릎L {m.leftKnee}°<br/>X-Factor {m.xFactor}°
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* ── 관절 수치 상세 (어드레스 기준) ── */}
            {Object.values(poseData).some(v=>v!==null) && (
              <div className="card" style={{marginBottom:16}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                  <div style={{fontSize:13,fontWeight:700,color:'#fff'}}>📐 관절 수치 상세 분석</div>
                  <div style={{display:'flex',gap:6}}>
                    {['address','top','impact','follow'].map((k,i)=>(
                      poseData[k] && <span key={k} style={{fontSize:10,padding:'1px 8px',borderRadius:12,background:`${PHASE_COLOR[i]}18`,color:PHASE_COLOR[i],border:`1px solid ${PHASE_COLOR[i]}44`,cursor:'pointer',fontFamily:'JetBrains Mono'}}>{PHASES[i]}</span>
                    ))}
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
                  {/* 어드레스 + 탑 */}
                  {['address','top'].map((k,pi)=>{
                    const m=poseData[k];
                    if (!m) return null;
                    return (
                      <div key={k}>
                        <div style={{fontSize:12,fontWeight:600,color:PHASE_COLOR[pi],marginBottom:10}}>
                          {PHASE_EMOJI[pi]} {PHASES[pi]} 관절 수치
                        </div>
                        {Object.entries(m).map(([mk,val])=>(
                          val!=null && <MetricBar key={mk} metricKey={mk} value={val}/>
                        ))}
                      </div>
                    );
                  })}
                </div>
                <div style={{marginTop:16,display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
                  {['impact','follow'].map((k,ki)=>{
                    const m=poseData[k];
                    if (!m) return null;
                    return (
                      <div key={k}>
                        <div style={{fontSize:12,fontWeight:600,color:PHASE_COLOR[ki+2],marginBottom:10}}>
                          {PHASE_EMOJI[ki+2]} {PHASES[ki+2]} 관절 수치
                        </div>
                        {Object.entries(m).map(([mk,val])=>(
                          val!=null && <MetricBar key={mk} metricKey={mk} value={val}/>
                        ))}
                      </div>
                    );
                  })}
                </div>
                <div style={{marginTop:12,fontSize:11,color:'var(--dim)',padding:'8px 12px',borderRadius:6,background:'var(--s2)'}}>
                  <span style={{color:'rgba(34,197,94,.5)'}}>■</span> 녹색 범위 = 이상적 구간 &nbsp;·&nbsp; 수치가 범위 내면 ✓ 정상
                </div>
              </div>
            )}

            {/* ── 피드백 + Good/Drill ── */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:'#fff',marginBottom:10}}>🎯 우선순위 피드백</div>
                {result.critical?.map((item,i)=><FeedbackCard key={'c'+i} item={item} priority="critical"/>)}
                {result.important?.map((item,i)=><FeedbackCard key={'i'+i} item={item} priority="important"/>)}
                {result.optional?.map((item,i)=><FeedbackCard key={'o'+i} item={item} priority="optional"/>)}
                <div style={{marginTop:12,padding:'10px 12px',borderRadius:8,background:'var(--s2)',border:'1px solid var(--bd)'}}>
                  {[{c:'var(--red)',l:'즉시 교정 (Critical)',d:'먼저 집중해야 할 핵심 문제'},
                    {c:'var(--amber)',l:'중요 개선 (Important)',d:'Critical 해결 후 순차 교정'},
                    {c:'#60a5fa',l:'선택 개선 (Optional)',d:'완성도를 높이는 세부 조정'}
                  ].map((r,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:i<2?7:0}}>
                      <div style={{width:3,height:28,background:r.c,borderRadius:2,flexShrink:0,marginTop:2}}/>
                      <div>
                        <div style={{fontSize:11,fontWeight:600,color:r.c}}>{r.l}</div>
                        <div style={{fontSize:10,color:'var(--dim)'}}>{r.d}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:'#fff',marginBottom:10}}>✅ 잘 된 점 & 연습 드릴</div>
                <div className="fb-good" style={{borderRadius:8,padding:'12px 14px',marginBottom:10}}>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--green)',marginBottom:7}}>👍 잘 된 점</div>
                  {result.goodPoints?.map((pt,i)=>(
                    <div key={i} style={{fontSize:12,color:'var(--muted)',marginBottom:5,display:'flex',gap:7,lineHeight:1.7}}>
                      <span style={{color:'var(--green)',flexShrink:0}}>✓</span>{pt}
                    </div>
                  ))}
                </div>
                <div className="fb-drill" style={{borderRadius:8,padding:'12px 14px'}}>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--purple)',marginBottom:3}}>🏋️ 맞춤 연습 드릴</div>
                  <div style={{fontSize:13,fontWeight:700,color:'#fff',marginBottom:6}}>{result.drillTitle}</div>
                  <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.85}}>{result.drillDesc}</div>
                </div>
              </div>
            </div>

            {/* HFE note */}
            <div style={{padding:'12px 16px',borderRadius:10,background:'rgba(168,85,247,.05)',border:'1px solid rgba(168,85,247,.2)'}}>
              <div style={{fontSize:11,color:'var(--purple)',fontWeight:600,marginBottom:3}}>💡 HFE 기반 분석 원칙</div>
              <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.85}}>
                인간공학(HFE) 원칙에 따라 <strong style={{color:'#e2eaf4'}}>Critical 항목 1~2개에 집중</strong>하도록 설계되었습니다.
                <strong style={{color:'#e2eaf4'}}> Critical → Important → Optional 순서로 단계적 교정</strong>을 권장합니다.
                관절 수치는 MediaPipe 추정값으로 참고용이며, 전문 코치 지도와 병행하시기 바랍니다.
              </div>
            </div>
          </div>
        )}

        </div>
        )}

        {/* ═══ HISTORY TAB ═══ */}
        {tab==='history' && (
          <div className="fade-up">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:10}}>
              <div>
                <div style={{fontSize:18,fontWeight:700,color:'#fff',marginBottom:3}}>📅 분석 히스토리</div>
                <div style={{fontSize:12,color:'var(--muted)'}}>{'총 '+history.length+'회 저장됨 · 최대 20회'}</div>
              </div>
              {history.length > 0 && (
                <button onClick={()=>{if(window.confirm('전체 삭제할까요?')){setHistory(hClear());}}}
                  style={{padding:'6px 14px',borderRadius:8,fontSize:11,cursor:'pointer',
                    background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',color:'var(--red)'}}>
                  🗑 전체 삭제
                </button>
              )}
            </div>
            {history.length === 0 ? (
              <div style={{textAlign:'center',padding:'60px 0',color:'var(--dim)'}}>
                <div style={{fontSize:48,marginBottom:12}}>📭</div>
                <div style={{fontSize:15,color:'var(--muted)',marginBottom:8}}>아직 분석 기록이 없습니다</div>
                <div style={{fontSize:13}}>분석 탭에서 스윙을 분석하면 자동 저장됩니다</div>
                <button onClick={()=>setTab('analysis')}
                  style={{marginTop:16,padding:'8px 20px',borderRadius:8,background:'var(--green)',
                    border:'none',color:'#000',fontSize:13,fontWeight:700,cursor:'pointer'}}>
                  📹 분석 시작
                </button>
              </div>
            ) : (
              <div>
                {history.length >= 2 && (
                  <div className="card" style={{marginBottom:16}}>
                    <div style={{fontSize:13,fontWeight:700,color:'#fff',marginBottom:10}}>📈 점수 추이</div>
                    <TrendChart history={history}/>
                  </div>
                )}
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:10}}>
                  {history.map(s => (
                    <HistCard key={s.id} s={s} selMode={false}
                      isA={!!(cmpSel.a && cmpSel.a.id===s.id)}
                      isB={!!(cmpSel.b && cmpSel.b.id===s.id)}
                      onSel={()=>{}} onDel={id=>setHistory(hDel(id))}/>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ═══ COMPARE TAB ═══ */}
        {tab==='compare' && (
          <div className="fade-up">
            <div style={{fontSize:18,fontWeight:700,color:'#fff',marginBottom:6}}>⚖️ Before / After 비교</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>히스토리에서 A·B 각각 선택하세요</div>
            {history.length < 2 ? (
              <div style={{textAlign:'center',padding:'40px',background:'var(--s1)',borderRadius:12,border:'1px solid var(--bd)'}}>
                <div style={{fontSize:40,marginBottom:10}}>📊</div>
                <div style={{fontSize:14,color:'var(--muted)',marginBottom:6}}>비교할 기록이 2개 이상 필요합니다</div>
                <button onClick={()=>setTab('analysis')}
                  style={{padding:'8px 20px',borderRadius:8,background:'var(--green)',border:'none',
                    color:'#000',fontSize:12,fontWeight:700,cursor:'pointer'}}>📹 분석하기</button>
              </div>
            ) : (
              <div>
                <div className="card" style={{marginBottom:14}}>
                  <div style={{fontSize:12,fontWeight:600,color:'#fff',marginBottom:8}}>
                    {'세션 선택 — '+(!cmpSel.a?'A 선택':!cmpSel.b?'B 선택':'비교 준비 완료 ✓')}
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:8,maxHeight:300,overflowY:'auto'}}>
                    {history.map(s => (
                      <HistCard key={s.id} s={s} selMode={true}
                        isA={!!(cmpSel.a && cmpSel.a.id===s.id)}
                        isB={!!(cmpSel.b && cmpSel.b.id===s.id)}
                        onSel={sel=>{setCmpSel(prev=>{
                          if(prev.a&&prev.a.id===sel.id) return {...prev,a:null};
                          if(prev.b&&prev.b.id===sel.id) return {...prev,b:null};
                          if(!prev.a) return {...prev,a:sel};
                          if(!prev.b) return {...prev,b:sel};
                          return {a:sel,b:null};
                        });}}
                        onDel={id=>setHistory(hDel(id))}/>
                    ))}
                  </div>
                </div>
                {cmpSel.a && cmpSel.b && (
                  <div className="fade-up">
                    <div className="card" style={{marginBottom:14}}>
                      <div style={{display:'flex',alignItems:'flex-start',gap:20,flexWrap:'wrap'}}>
                        <div style={{flex:1,minWidth:220}}>
                          <div style={{fontSize:13,fontWeight:700,color:'#fff',marginBottom:10}}>종합 점수 변화</div>
                          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
                            <div style={{textAlign:'center'}}>
                              <div style={{fontSize:11,color:'var(--muted)',marginBottom:3}}>A (Before)</div>
                              <span style={{fontFamily:'JetBrains Mono',fontSize:32,fontWeight:900,color:'#22c55e'}}>{cmpSel.a.totalScore}</span>
                            </div>
                            <span style={{fontSize:24,color:'var(--dim)'}}>{'→'}</span>
                            <div style={{textAlign:'center'}}>
                              <div style={{fontSize:11,color:'var(--muted)',marginBottom:3}}>B (After)</div>
                              <span style={{fontFamily:'JetBrains Mono',fontSize:32,fontWeight:900,color:'#06b6d4'}}>{cmpSel.b.totalScore}</span>
                            </div>
                            <span style={{fontSize:20,fontWeight:700,color:cmpSel.b.totalScore>cmpSel.a.totalScore?'var(--green)':cmpSel.b.totalScore<cmpSel.a.totalScore?'var(--red)':'var(--muted)'}}>
                              {'('+(cmpSel.b.totalScore>=cmpSel.a.totalScore?'+':'')+(cmpSel.b.totalScore-cmpSel.a.totalScore)+')'}
                            </span>
                          </div>
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
                            {Object.keys(DOMAIN).map(k => {
                              const d=DOMAIN[k];
                              const va=cmpSel.a.scores[k]||0, vb=cmpSel.b.scores[k]||0;
                              const diff=vb-va;
                              const col=diff>0?'var(--green)':diff<0?'var(--red)':'var(--muted)';
                              return (
                                <div key={k} style={{padding:'6px 8px',borderRadius:7,background:'var(--s2)',border:'1px solid '+d.color+'22'}}>
                                  <div style={{fontSize:9,color:'var(--muted)',marginBottom:2}}>{d.icon} {d.label}</div>
                                  <div style={{display:'flex',alignItems:'baseline',gap:4}}>
                                    <span style={{fontFamily:'JetBrains Mono',fontSize:13,fontWeight:700,color:'#22c55e'}}>{va}</span>
                                    <span style={{fontSize:9,color:'var(--dim)'}}>{'→'}</span>
                                    <span style={{fontFamily:'JetBrains Mono',fontSize:13,fontWeight:700,color:'#06b6d4'}}>{vb}</span>
                                    <span style={{fontSize:10,fontWeight:700,color:col,marginLeft:'auto'}}>{(diff>=0?'+':'')+diff}</span>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                        <div style={{flexShrink:0,textAlign:'center'}}>
                          <div style={{fontSize:11,color:'var(--muted)',marginBottom:6}}>레이더 비교</div>
                          <CmpRadar sA={cmpSel.a} sB={cmpSel.b}/>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ═══ PRO REFERENCE TAB ═══ */}
        {tab==='proref' && (
          <ProReferencePanel
            myScores={result ? result.scores : (history[0] ? history[0].scores : null)}
            myPoseData={
              poseData && Object.keys(poseData).length > 0
                ? poseData
                : (history[0] && history[0].poseData ? history[0].poseData : null)
            }
          />
        )}

      </div>

      {/* 숨김 ref 비디오 */}
      {videoUrl && (
        <video ref={videoRef} src={videoUrl} preload="auto" muted playsInline
          style={{position:'fixed',top:-9999,left:-9999,width:1,height:1,opacity:0,pointerEvents:'none'}}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
